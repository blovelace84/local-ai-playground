<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Playground</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Segoe UI, Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
        }

        .message-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            align-items: flex-start;
        }

        .user-row {
            justify-content: flex-end;
        }

        .ai-row {
            justify-content: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 999px;
            background: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-row .avatar {
            order: 2;
        }

        .message-content {
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .chat-list-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    gap: 4px;
    margin-bottom: 8px;
}

.chat-list-item {
    margin: 0;
    overflow: hidden;
    text-align: left;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.active-chat {
    background: #2563eb;
}

.chat-action-button {
    margin: 0;
    padding: 8px;
    background: transparent;
}

.chat-action-button:hover {
    background: #374151;
}

.error-message {
    margin-bottom: 16px;
    padding: 12px;
    border: 1px solid #ef4444;
    border-radius: 8px;
    background: #450a0a;
    color: #fecaca;
}

.input-actions {
    display: flex;
    justify-content: space-between;
    gap: 12px;
}

.secondary-button {
    background: #374151;
}

.secondary-button:hover {
    background: #4b5563;
}

        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background: #1f2937;
            color: white;
            border: 1px solid #374151;
        }

        .sidebar {
            background: #111827;
            border-right: 1px solid #374151;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            margin-top: 0;
        }

        .sidebar-button {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .sidebar-button:hover {
            background: #1d4ed8;
        }

        .sidebar-section {
            margin-top: 20px;
            color: #cbd5e1;
        }

        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .topbar {
            padding: 20px;
            border-bottom: 1px solid #374151;
            background: #111827;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #0f172a;
        }

        .message {
            max-width: 75%;
            margin-bottom: 16px;
            padding: 14px;
            border-radius: 12px;
        }

        .user {
            margin-left: auto;
            background: #2563eb;
        }

        .ai {
            margin-right: auto;
            background: #1f2937;
        }

        .message-label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 6px;
            color: #d1d5db;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #374151;
            background: #111827;
        }

        textarea {
            width: 100%;
            min-height: 80px;
            resize: none;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #374151;
            background: #1f2937;
            color: white;
            font-size: 15px;
        }

        button {
            margin-top: 12px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .empty-state {
            color: #94a3b8;
            text-align: center;
            margin-top: 100px;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/ui/app.js"></script>
</body>

</html>
